    projects:
      - name: headroom — Vertex AI Provisioned Throughput broker
        date: 2026-04
        highlights:
          - "**Source**: [github.com/tedzhao226/headroom](https://github.com/tedzhao226/headroom)"
          - Built async Python service (FastAPI + SAQ[postgres] + SQLAlchemy 2 + asyncpg) that queues LLM requests against Vertex AI Provisioned Throughput and dispatches them only when per-endpoint token-per-second capacity (and, for night jobs, a UTC window) allows — recovering idle overnight PT while protecting daytime latency.
          - Designed Postgres-only two-queue architecture (no Redis); capacity and time gates run in SAQ `before_process` hooks backed by `FOR UPDATE SKIP LOCKED` dispatch.
          - Implemented `VertexMonitor` polling GCP Cloud Monitoring every 60s with conservative fallback after consecutive failures, plus a `monitor_samples` Postgres table for time-series observability without Prometheus.
          - Testcontainers-backed integration suite + dockerized smoke test; spec-driven development via GitHub Spec Kit (constitution, spec, plan, tasks).
